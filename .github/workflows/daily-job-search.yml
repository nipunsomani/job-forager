name: Daily Job Search

on:
  schedule:
    # Run daily at 01:00 UTC (02:00 BST summer / 01:00 GMT winter)
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install optional dependencies
        run: |
          pip install playwright || true
          playwright install chromium || true

      - name: Run job search
        env:
          PYTHONPATH: src
        run: |
          python -m jobforager.cli search \
            --sources all \
            --keywords "Application Security,Application Security Engineer,Security,Security Engineer,Pentest,Penetration Test,Penetration Tester,Penetration Testing Engineer,Offensive Security,Offensive Security Engineer,Offsec,Offsec Engineer,Product Security,Product Security Engineer" \
            --last 15d \
            --output-json jobs.json \
            --output-csv jobs.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-search-results-${{ github.run_id }}
          path: |
            jobs.json
            jobs.csv
          retention-days: 7
